---
- name: Show target server information
  ansible.builtin.debug:
    msg:
      - "Hostname: {{ ansible_hostname }}"
      - "Distribution: {{ ansible_distribution }} {{ ansible_distribution_version }}"
      - "Kernel: {{ ansible_kernel }}"
      - "Architecture: {{ ansible_architecture }}"

- name: Assert supported OS family
  ansible.builtin.assert:
    that:
      - ansible_os_family == "RedHat"
    fail_msg: "This role is intended for Rocky Linux / RHEL family servers."

- name: Check current timezone
  ansible.builtin.command: timedatectl show --property=Timezone --value
  register: current_timezone
  changed_when: false

- name: Set timezone
  ansible.builtin.command: "timedatectl set-timezone {{ timezone }}"
  when: current_timezone.stdout != timezone

- name: Install common packages
  ansible.builtin.dnf:
    name: "{{ common_packages }}"
    state: present

- name: Ensure common services are enabled and running
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  loop: "{{ common_services }}"

- name: Check SELinux status
  ansible.builtin.command: getenforce
  register: selinux_status
  changed_when: false
  failed_when: false

- name: Show SELinux status
  ansible.builtin.debug:
    msg: "SELinux status: {{ selinux_status.stdout | default('unknown') }}"
