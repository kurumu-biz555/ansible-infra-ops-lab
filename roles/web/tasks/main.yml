---
- name: Install Apache HTTP Server
  ansible.builtin.dnf:
    name: "{{ web_package_name }}"
    state: present

- name: Deploy index.html
  ansible.builtin.template:
    src: index.html.j2
    dest: "{{ web_document_root }}/index.html"
    owner: "{{ web_index_owner }}"
    group: "{{ web_index_group }}"
    mode: "{{ web_index_mode }}"
  notify: Restart web service

- name: Check firewalld HTTP service rule
  ansible.builtin.command: firewall-cmd --permanent --query-service=http
  register: firewalld_http_rule
  changed_when: false
  failed_when: false

- name: Allow HTTP service through firewalld
  ansible.builtin.command: firewall-cmd --permanent --add-service=http
  when: firewalld_http_rule.rc != 0
  notify: Reload firewalld

- name: Ensure Apache HTTP Server is enabled and running
  ansible.builtin.systemd:
    name: "{{ web_service_name }}"
    state: started
    enabled: true
